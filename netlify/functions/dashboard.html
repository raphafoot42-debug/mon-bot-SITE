<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa AI - Dashboard</title>
    <link rel="stylesheet" href="/netlify/css/nexa.css">
</head>
<body style="background:#050505; color:#fff; font-family:Arial, sans-serif;">

    <!-- display initial cohérent : caché, puis flex uniquement via JS -->
    <div id="loader" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
        <p>Synchronisation avec TikTok...</p>
    </div>

    <nav style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between; gap:16px;">
        <div style="font-weight:bold; color:#00ff88;">NEXA AI</div>
        <div id="user-info">Chargement...</div>
    </nav>

    <main style="padding:40px;">
        <h1>Tableau de bord</h1>
        <div id="stats-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:20px;">
            <div style="background:#111; padding:20px; border-radius:10px; border:1px solid #333;">
                <h3>Prospects</h3>
                <p id="count-prospects">0</p>
            </div>
        </div>
    </main>

    <script>
    function setLoaderVisible(visible) {
        const loader = document.getElementById('loader');
        if (!loader) return;
        loader.style.display = visible ? 'flex' : 'none';
    }

    async function readJsonSafe(response) {
        const text = await response.text();
        if (!text) return null;
        try {
            return JSON.parse(text);
        } catch {
            return { _nonJson: true, text };
        }
    }

    function clearOAuthQueryFromUrl() {
        const url = new URL(window.location.href);
        url.searchParams.delete('code');
        url.searchParams.delete('state');
        url.searchParams.delete('scopes');
        url.searchParams.delete('error');
        url.searchParams.delete('error_description');
        window.history.replaceState({}, document.title, url.pathname + url.search);
    }

    async function handleTikTokCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const returnedState = urlParams.get('state');

        if (!code) {
            loadDashboardData();
            return;
        }

        const verifier = sessionStorage.getItem('pkce_verifier');
        const expectedState = sessionStorage.getItem('oauth_state');

        if (!verifier) {
            console.error('PKCE verifier introuvable (sessionStorage).');
            alert('Connexion TikTok impossible : session expirée ou navigateur privé. Recommence la connexion depuis le début.');
            clearOAuthQueryFromUrl();
            loadDashboardData();
            return;
        }

        if (expectedState && returnedState && expectedState !== returnedState) {
            console.error('State OAuth invalide (possible CSRF).');
            alert('Connexion TikTok refusée : state invalide. Réessaie.');
            clearOAuthQueryFromUrl();
            loadDashboardData();
            return;
        }

        setLoaderVisible(true);

        try {
            const response = await fetch('/.netlify/functions/tiktok-callback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, verifier, state: returnedState })
            });

            const data = await readJsonSafe(response);

            if (!response.ok) {
                const msg = (data && data.message) || (data && data.error) || (data && data.text) || ('HTTP ' + response.status);
                throw new Error(msg);
            }

            if (!data || data.success !== true) {
                throw new Error((data && data.message) || 'Erreur de synchro');
            }

            // Si ta function renvoie un token / user, stocke-le ici (adapte aux champs réels)
            // Exemples possibles :
            // if (data.access_token) localStorage.setItem('nexa_access_token', data.access_token);
            // if (data.user) localStorage.setItem('nexa_user', JSON.stringify(data.user));

            // Nettoyer les secrets OAuth côté client
            sessionStorage.removeItem('pkce_verifier');
            sessionStorage.removeItem('oauth_state');

            clearOAuthQueryFromUrl();

            loadDashboardData();
        } catch (err) {
            console.error('Erreur OAuth:', err);
            alert('Erreur lors de la connexion TikTok : ' + (err && err.message ? err.message : 'inconnue'));
        } finally {
            setLoaderVisible(false);
        }
    }

    function loadDashboardData() {
        // Rediriger vers index.html qui contient le vrai dashboard (prospects, stats, etc.)
        window.location.href = '/index.html';
    }

    window.addEventListener('load', handleTikTokCallback);
    </script>
</body>
</html>
