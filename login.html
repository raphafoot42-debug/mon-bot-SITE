<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login TikTok - Nexa</title>
</head>
<body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial">

<button id="login" style="padding: 15px 30px; cursor: pointer; border-radius: 8px; border: none; background: #fe2c55; color: white; font-weight: bold;">
  Se connecter avec TikTok
</button>

<script>
function base64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary)
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

async function sha256(text) {
  const data = new TextEncoder().encode(text);
  return crypto.subtle.digest('SHA-256', data);
}

// CORRECTION : Générateur sécurisé (Web Crypto API)
function randomVerifier() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const array = new Uint32Array(64);
  window.crypto.getRandomValues(array);
  let v = '';
  for (let i = 0; i < 64; i++) {
    v += chars[array[i] % chars.length];
  }
  return v;
}

document.getElementById('login').onclick = async () => {
  const verifier = randomVerifier();
  sessionStorage.setItem('pkce_verifier', verifier);
  const challenge = base64url(await sha256(verifier));

  const part1 = "sbaw1dlti";
  const part2 = "zgdnu9xs8";

  // CORRECTION : URL de redirection dynamique
  const currentOrigin = window.location.origin;

  const params = new URLSearchParams({
    client_key: part1 + part2,
    response_type: 'code',
    scope: 'user.info.basic,video.list', // CORRECTION : Ajout de scopes
    redirect_uri: currentOrigin + '/.netlify/functions/tiktok-callback',
    state: Math.random().toString(36).substring(7),
    code_challenge: challenge,
    code_challenge_method: 'S256'
  });

  window.location.href = 'https://www.tiktok.com/v2/auth/authorize/?' + params.toString();
};
</script>
</body>
</html>
