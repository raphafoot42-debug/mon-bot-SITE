<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login TikTok - Nexa</title>
</head>
<body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial">

<button id="login" style="padding: 15px 30px; cursor: pointer; border-radius: 8px; border: none; background: #fe2c55; color: white; font-weight: bold;">
  Se connecter avec TikTok
</button>

<script>
// NOTE: client_key OAuth TikTok = identifiant public côté navigateur (ce n'est pas un secret).
// Le secret (client_secret) doit rester UNIQUEMENT côté serveur (Netlify env).
const TIKTOK_CLIENT_KEY = "sbaw1dltizgdnu9xs8"; // remplace par ta vraie client_key

function base64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = "";
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

async function sha256Bytes(text) {
  const data = new TextEncoder().encode(text);
  return crypto.subtle.digest("SHA-256", data);
}

function generateSecureString(length) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  let v = "";
  for (let i = 0; i < length; i++) v += chars[array[i] % chars.length];
  return v;
}

document.getElementById("login").onclick = async () => {
  // PKCE
  const verifier = generateSecureString(64);
  sessionStorage.setItem("pkce_verifier", verifier);
  const challenge = base64url(await sha256Bytes(verifier));

  // CSRF state (même clé que ton dashboard)
  const state = generateSecureString(16);
  sessionStorage.setItem("oauth_state", state);

  const currentOrigin = window.location.origin;

  // IMPORTANT:
  // - Ce redirect_uri doit être EXACTEMENT celui enregistré dans TikTok.
  // - Ce doit être une PAGE (pas la function), sinon le serveur ne peut pas lire pkce_verifier.
  // Exemple: crée tiktok-bridge.html et enregistre: https://TON_DOMAINE/tiktok-bridge.html
  const redirectUri = currentOrigin + "/tiktok-bridge.html";

  const params = new URLSearchParams({
    client_key: TIKTOK_CLIENT_KEY,
    response_type: "code",
    // Garde uniquement les scopes autorisés sur ton app TikTok
    scope: "user.info.basic",
    redirect_uri: redirectUri,
    state,
    code_challenge: challenge,
    code_challenge_method: "S256",
  });

  window.location.href = "https://www.tiktok.com/v2/auth/authorize/?" + params.toString();
};
</script>
</body>
</html>
