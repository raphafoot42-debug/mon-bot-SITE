<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connexion TikTok — NEXA AI">
  <title>Connexion TikTok — NEXA AI</title>
  <link rel="stylesheet" href="/netlify/css/nexa.css">
  <style>
    body { background:#000; color:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Inter',Arial,sans-serif; margin:0; }
    .login-box { background:#111; border:1px solid #222; border-radius:16px; padding:48px 40px; max-width:420px; width:100%; text-align:center; }
    .logo { color:#39ff14; font-size:1.8rem; font-weight:900; letter-spacing:2px; margin-bottom:8px; }
    .subtitle { color:#666; font-size:0.9rem; margin-bottom:32px; }
    .btn-tiktok { background:#fe2c55; color:#fff; border:none; border-radius:10px; padding:16px 32px; font-size:1rem; font-weight:700; cursor:pointer; width:100%; transition:opacity 0.2s; display:flex; align-items:center; justify-content:center; gap:10px; }
    .btn-tiktok:hover { opacity:0.85; }
    .btn-tiktok:disabled { opacity:0.5; cursor:not-allowed; }
    .status { margin-top:16px; font-size:0.85rem; min-height:20px; color:#aaa; }
    .status.error { color:#ff6b6b; }
    .back-link { display:block; margin-top:24px; color:#555; font-size:0.8rem; text-decoration:none; }
    .back-link:hover { color:#39ff14; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">NEXA AI</div>
    <p class="subtitle">Connecte ton compte TikTok pour commencer</p>

    <button id="login" class="btn-tiktok">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.79 1.54V6.78a4.85 4.85 0 01-1.02-.09z"/></svg>
      Se connecter avec TikTok
    </button>

    <p id="status" class="status"></p>
    <a href="/" class="back-link">← Retour au site</a>
  </div>

<script>
// NOTE: client_key OAuth TikTok = identifiant public côté navigateur (ce n'est pas un secret).
const TIKTOK_CLIENT_KEY = "sbaw1dltizgdnu9xs8";

function base64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = "";
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

async function sha256Bytes(text) {
  const data = new TextEncoder().encode(text);
  return crypto.subtle.digest("SHA-256", data);
}

function generateSecureString(length) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  let v = "";
  for (let i = 0; i < length; i++) v += chars[array[i] % chars.length];
  return v;
}

function setStatus(msg, isError = false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status" + (isError ? " error" : "");
}

document.getElementById("login").onclick = async () => {
  const btn = document.getElementById("login");
  btn.disabled = true;
  setStatus("⏳ Préparation de la connexion...");

  try {
    const verifier = generateSecureString(64);
    sessionStorage.setItem("pkce_verifier", verifier);
    const challenge = base64url(await sha256Bytes(verifier));

    const state = generateSecureString(16);
    sessionStorage.setItem("oauth_state", state);

    const redirectUri = window.location.origin + "/tiktok-bridge.html";

    const params = new URLSearchParams({
      client_key: TIKTOK_CLIENT_KEY,
      response_type: "code",
      scope: "user.info.basic",
      redirect_uri: redirectUri,
      state,
      code_challenge: challenge,
      code_challenge_method: "S256",
    });

    setStatus("✅ Redirection vers TikTok...");
    window.location.href = "https://www.tiktok.com/v2/auth/authorize/?" + params.toString();
  } catch (err) {
    setStatus("❌ Erreur : " + (err.message || "inconnue"), true);
    btn.disabled = false;
  }
};
</script>
</body>
</html>
