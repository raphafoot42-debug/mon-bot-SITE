<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok OAuth Login</title>
</head>

<body style="background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial">

  <button id="login">Se connecter avec TikTok</button>

  <script>
    function base64url(buffer) {
      return btoa(String.fromCharCode(...new Uint8Array(buffer)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      return crypto.subtle.digest('SHA-256', data);
    }

    document.getElementById('login').onclick = async () => {

      // TON VERIFIER FIXE
      const verifier = "IZej5k1MZ2a6EhJsEkFRUc4mC2VQMlNZU4Xkd7xbjYA";

      sessionStorage.setItem('pkce_verifier', verifier);

      // CHALLENGE CORRECT
      const challenge = base64url(await sha256(verifier));

      const url = new URL('https://www.tiktok.com/v2/auth/authorize/');

      url.search = new URLSearchParams({
        client_key: 'awa1x5rwccfeu9wi',
        response_type: 'code',
        scope: 'user.info.basic',
        redirect_uri: 'http://127.0.0.1:8085',
        state: 'abc123',
        code_challenge: challenge,
        code_challenge_method: 'S256'
      });

      window.location.href = url.toString();
    };
  </script>

</body>
</html>
