<script>
  const params = new URLSearchParams(window.location.search);

  const code = params.get("code");

  if (!code) {
    document.body.innerHTML = "❌ Pas de code TikTok";
  } else {
    document.body.innerHTML = `
      <h1>Code TikTok reçu ✅</h1>
      <p>${code}</p>
      <p>Maintenant backend requis pour récupérer le token</p>
    `;
  }
</script>
