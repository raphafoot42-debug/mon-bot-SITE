[build]
  command = "npm install"
  functions = "Netlify/Fonction"
  publish = "."

# Headers pour les fichiers CSS et JS dans les sous-dossiers Netlify
[[headers]]
  for = "/Netlify/CSS/*"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/Netlify/Fonction/JS/*"
  [headers.values]
    Content-Type = "application/javascript"

# Fichiers statiques — NE PAS rediriger vers index.html
[[redirects]]
  from = "/Netlify/CSS/*"
  to = "/Netlify/CSS/:splat"
  status = 200

[[redirects]]
  from = "/Netlify/Fonction/JS/*"
  to = "/Netlify/Fonction/JS/:splat"
  status = 200

[[redirects]]
  from = "/Netlify/dashboard.html"
  to = "/Netlify/dashboard.html"
  status = 200

# SPA Redirect - toutes les autres routes vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

