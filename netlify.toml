[build]
  command = "npm install"
  functions = "netlify/fonctions"
  publish = "."

# ════════════════════════════════════════════════════════
# HEADERS — Content-Type pour CSS et JS
# ════════════════════════════════════════════════════════

[[headers]]
  for = "/netlify/css/*"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/netlify/fonction/js/*"
  [headers.values]
    Content-Type = "application/javascript"

# ════════════════════════════════════════════════════════
# HEADERS SÉCURITÉ — appliqués sur toutes les pages
# (Ces valeurs sont aussi en commentaire dans index.html)
# ════════════════════════════════════════════════════════

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://js.stripe.com https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com https://*.supabase.co https://api.stripe.com; frame-src https://js.stripe.com; img-src 'self' data: https:;"

# ════════════════════════════════════════════════════════
# REDIRECTS
# ════════════════════════════════════════════════════════

# Fichiers statiques — ne pas rediriger vers index.html
[[redirects]]
  from = "/netlify/css/*"
  to = "/netlify/css/:splat"
  status = 200

[[redirects]]
  from = "/netlify/fonction/js/*"
  to = "/netlify/fonction/js/:splat"
  status = 200

# Page de vente dynamique clients affiliation
[[redirects]]
  from = "/shop/*"
  to = "/shop.html"
  status = 200

# Page de callback TikTok OAuth (page de transition vers la SPA)
[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/tiktok-bridge.html"
  to = "/tiktok-bridge.html"
  status = 200

# Fichier de vérification domaine TikTok
[[redirects]]
  from = "/tiktoktWQ8pjrtXhK7wMTbJONaO8QbrnXJxMlQ.txt"
  to = "/tiktoktWQ8pjrtXhK7wMTbJONaO8QbrnXJxMlQ.txt"
  status = 200

# SPA redirect — toutes les autres routes vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ════════════════════════════════════════════════════════
# VARIABLES D'ENVIRONNEMENT
# ⚠️ Toutes les variables sont dans Netlify UI uniquement :
#    Settings > Build & deploy > Environment variables
# ════════════════════════════════════════════════════════
