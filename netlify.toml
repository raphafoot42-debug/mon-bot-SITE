[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."

# ════════════════════════════════════════════════════════
# SECRETS SCANNING
# Ces clés sont des identifiants PUBLICS (côté navigateur) :
# URL Supabase + clé publishable, client key TikTok, URLs publiques,
# Price IDs Stripe, nom du modèle Claude. Elles sont conçues pour être
# visibles dans le code client, donc on les exclut du scan.
# ⚠️ Les VRAIS secrets (clés API, service role, secret keys, mots de
# passe) NE sont PAS listés ici et restent protégés par le scanner.
# ════════════════════════════════════════════════════════
[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,TIKTOK_CLIENT_KEY,TIKTOK_REDIRECT_URI,SITE_URL,DASHBOARD_PATH,CLAUDE_MODEL,STRIPE_PRICE_STARTER,STRIPE_PRICE_PRO,STRIPE_PRICE_STARTER_ANNUAL,STRIPE_PRICE_PRO_ANNUAL"

# ════════════════════════════════════════════════════════
# HEADERS — Content-Type pour CSS et JS
# ════════════════════════════════════════════════════════

[[headers]]
  for = "/netlify/css/*"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/netlify/js/*"
  [headers.values]
    Content-Type = "application/javascript"

# ════════════════════════════════════════════════════════
# HEADERS SÉCURITÉ — appliqués sur toutes les pages
# (Ces valeurs sont aussi en commentaire dans index.html)
# ════════════════════════════════════════════════════════

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://js.stripe.com https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com https://*.supabase.co https://api.stripe.com; frame-src https://js.stripe.com; img-src 'self' data: https:;"

# ════════════════════════════════════════════════════════
# REDIRECTS
# ════════════════════════════════════════════════════════

[[redirects]]
  from = "/netlify/css/*"
  to = "/netlify/css/:splat"
  status = 200

[[redirects]]
  from = "/netlify/js/*"
  to = "/netlify/js/:splat"
  status = 200

[[redirects]]
  from = "/shop/*"
  to = "/shop.html"
  status = 200

[[redirects]]
  from = "/tiktok-bridge.html"
  to = "/tiktok-bridge.html"
  status = 200

[[redirects]]
  from = "/tiktoktWQ8pjrtXhK7wMTbJONaO8QbrnXJxMlQ.txt"
  to = "/tiktoktWQ8pjrtXhK7wMTbJONaO8QbrnXJxMlQ.txt"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ════════════════════════════════════════════════════════
# SCHEDULED FUNCTIONS
# ════════════════════════════════════════════════════════
[functions."block-account"]
  schedule = "@daily"

[secrets_scan]
  SECRETS_SCAN_OMIT_PATHS = [
    "netlify/functions/js/config.js",
    "netlify/js/config.js",
    "netlify/functions/js/nexa.js",
    "netlify/js/nexa.js",
    ".netlify/plugins/deno-cli"
  ]
